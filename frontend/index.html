<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmBuddy AI - Intelligent Agricultural Assistant</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="./image.png" alt="FarmBuddy Logo" width="36" height="36" style="border-radius:8px; object-fit:cover;">
                    <span>FarmBuddy</span>
                </div>
                <button class="new-chat-btn" id="newChatBtn" title="New chat">
                    <i class="fas fa-plus"></i>
                </button>
                <button class="close-sidebar" id="closeSidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="language-selector-container">
                <select class="language-select" id="languageSelect"></select>
            </div>

            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" placeholder="Search conversations..." class="search-input" id="searchInput">
            </div>

            <div class="history-list" id="historyList"></div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-seedling"></i>
                    </div>
                    <div class="user-details">
                        <span class="user-name">FarmBuddy</span>
                        <span class="user-plan">Farmer Assistant</span>
                    </div>
                </div>
                <div class="footer-actions">
                    <button class="theme-toggle-sidebar" id="themeToggle" title="Toggle theme">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="mobile-header">
                <button class="menu-btn" id="menuBtn">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="mobile-title-group">
                    <img src="./image.png" alt="Logo" width="28" height="28" style="border-radius:6px; object-fit:cover;">
                    <h2 class="mobile-title">FarmBuddy AI</h2>
                </div>
                <button class="mobile-new-chat" id="mobileNewChat">
                    <i class="fas fa-plus"></i>
                </button>
            </div>

            <div class="weather-widget-top" id="weatherWidget">
                <i class="fas fa-sun" id="weatherIcon"></i>
                <span id="weatherTemp">--°C</span>
                <span class="weather-divider">|</span>
                <span id="weatherLocation">Loading...</span>
            </div>

            <div class="messages" id="messages"></div>

            <div class="quick-actions-bar" id="quickActions">
                <button class="quick-action" onclick="setQuery('crop')">
                    <i class="fas fa-seedling"></i>
                    <span>Crop Advisory</span>
                </button>
                <button class="quick-action" onclick="setQuery('market')">
                    <i class="fas fa-chart-line"></i>
                    <span>Market Prices</span>
                </button>
                <button class="quick-action" onclick="setQuery('schemes')">
                    <i class="fas fa-file-alt"></i>
                    <span>Govt Schemes</span>
                </button>
                <button class="quick-action" onclick="setQuery('disease')">
                    <i class="fas fa-search"></i>
                    <span>Disease Detection</span>
                </button>
            </div>

            <div class="input-area">
                <div id="imagePreview" class="image-preview-container"></div>

                <div class="input-container">
                    <textarea
                        id="queryInput"
                        rows="1"
                        placeholder="Ask your farming question in any language..."
                        class="message-input"
                    ></textarea>

                    <div class="input-actions">
                        <button class="input-action-btn" id="voiceBtn" title="Voice input">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <button class="input-action-btn" id="attachBtn" title="Upload photo">
                            <i class="fas fa-camera"></i>
                        </button>
                        <button class="input-action-btn" id="videoAttachBtn" title="Upload video">
                            <i class="fas fa-video"></i>
                        </button>
                        <button class="send-btn" id="sendBtn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>

                <div class="disclaimer">
                    FarmBuddy AI can make mistakes. Verify important information with experts.
                </div>
            </div>
        </main>
    </div>

    <input type="file" id="imageUpload" accept="image/*" multiple style="display:none">
    <input type="file" id="videoUpload" accept="video/*" style="display:none">

    <div id="loading" class="loading-overlay" style="display:none;">
        <div class="loading-spinner"></div>
        <p>Analyzing your query...</p>
        <div class="loading-icons">
            <i class="fas fa-seedling"></i>
            <i class="fas fa-sun"></i>
            <i class="fas fa-cloud-rain"></i>
        </div>
    </div>

    <div id="responseArea" style="display:none;"></div>

    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
